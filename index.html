<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kshitij Inventory PWA</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f0f4f8; }
    h1 { color: #1976d2; text-align: center; }
    input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    button { background: #1976d2; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #1565c0; }
    .logout-btn { background: #d32f2f; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #1976d2; color: white; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .nav button { flex: 1; min-width: 90px; padding: 12px; }
    .tab { display: none; }
    .active { display: block; }
    .low { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen">
    <h1>Kshitij Inventory</h1>
    <h2>Login or Register</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>
    <button onclick="register()">Register New Account</button>
    <p id="authMessage" style="color: red; text-align: center;"></p>
  </div>

  <!-- App -->
  <div id="appScreen" style="display: none;">
    <div class="nav">
      <button onclick="showTab('dashboard')">Dashboard</button>
      <button onclick="showTab('addItem')">Add Item</button>
      <button onclick="showTab('adjust')">Adjust Stock</button>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="tab active">
      <h2>Realtime Stock</h2>
      <select id="warehouseSelect" onchange="loadItems()"></select>
      <button onclick="exportCSV()">Export CSV</button>
      <table id="stockTable">
        <thead><tr><th>Item</th><th>Batch</th><th>Expiry</th><th>Qty</th><th>Warehouse</th></tr></thead>
        <tbody></tbody>
      </table>
      <h3>Replenishment Needed</h3>
      <table id="replenishTable">
        <thead><tr><th>Item</th><th>Qty</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Add Item -->
    <div id="addItem" class="tab">
      <h2>Add New Item</h2>
      <input type="text" id="itemName" placeholder="Item Name">
      <input type="text" id="batch" placeholder="Batch Number">
      <input type="date" id="expiry">
      <input type="number" id="initialQty" placeholder="Quantity" value="0">
      <select id="addWarehouse"></select>
      <button onclick="addItem()">Add Item</button>
    </div>

    <!-- Adjust -->
    <div id="adjust" class="tab">
      <h2>Adjustment (Purchase / Return / Damage / Claim)</h2>
      <input type="number" id="adjustQty" placeholder="Quantity (+ receive, - deduct)">
      <textarea id="adjustNote" placeholder="Waybill / Invoice / Damage Reason / Claim ID"></textarea>
      <button onclick="adjustStock()">Apply</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyCxRWN5j9tXcP7F9ft498VtNdUYsTfaXSg",
  authDomain: "kshitij-inventory-pwa.firebaseapp.com",
  projectId: "kshitij-inventory-pwa",
  storageBucket: "kshitij-inventory-pwa.firebasestorage.app",
  messagingSenderId: "870923735908",
  appId: "1:870923735908:web:a98f3969261898126c2071"
};
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentWarehouse = "Main Warehouse";
    const warehouses = ["Main Warehouse", "Bangalore Warehouse", "Delhi Warehouse", "Mumbai Warehouse"];

    function register() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      if (!email || !pass) return alert("Enter email and password");
      auth.createUserWithEmailAndPassword(email, pass)
        .then(() => alert("Account created! Please login now."))
        .catch(e => document.getElementById('authMessage').innerText = e.message);
    }

    function login() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(cred => {
          currentUser = cred.user;
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appScreen').style.display = 'block';
          initApp();
        })
        .catch(e => document.getElementById('authMessage').innerText = e.message);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      if (tab === 'dashboard') loadItems();
    }

    function initApp() {
      const whSelect = document.getElementById('warehouseSelect');
      const addWh = document.getElementById('addWarehouse');
      warehouses.forEach(w => {
        let opt = document.createElement('option');
        opt.value = w; opt.textContent = w;
        whSelect.appendChild(opt.cloneNode(true));
        addWh.appendChild(opt);
      });
      loadItems();
    }

    function loadItems() {
      currentWarehouse = document.getElementById('warehouseSelect').value || "Main Warehouse";
      const tbody = document.getElementById('stockTable').querySelector('tbody');
      tbody.innerHTML = '';

      db.collection('inventory').where('warehouse', '==', currentWarehouse)
        .onSnapshot(snap => {
          tbody.innerHTML = '';
          let low = [];
          snap.forEach(doc => {
            const d = doc.data();
            const row = `<tr><td>\( {d.name||''}</td><td> \){d.batch||'-'}</td><td>\( {d.expiry||'-'}</td><td class=" \){d.quantity<10?'low':''}">\( {d.quantity||0}</td><td> \){d.warehouse}</td></tr>`;
            tbody.innerHTML += row;
            if (d.quantity < 10) low.push(d);
          });
          const lowBody = document.getElementById('replenishTable').querySelector('tbody');
          lowBody.innerHTML = low.map(item => `<tr><td>\( {item.name}</td><td class="low"> \){item.quantity}</td></tr>`).join('');
        });
    }

    function addItem() {
      const name = document.getElementById('itemName').value.trim();
      if (!name) return alert("Item name required");
      db.collection('inventory').add({
        name: name,
        batch: document.getElementById('batch').value.trim(),
        expiry: document.getElementById('expiry').value,
        quantity: parseInt(document.getElementById('initialQty').value) || 0,
        warehouse: document.getElementById('addWarehouse').value,
        createdBy: currentUser.email,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        alert("Item added!");
        showTab('dashboard');
      }).catch(e => alert(e.message));
    }

    function adjustStock() {
      const change = parseFloat(document.getElementById('adjustQty').value);
      if (!change) return alert("Enter quantity");
      db.collection('adjustments').add({
        change: change,
        note: document.getElementById('adjustNote').value.trim() || "Adjustment",
        warehouse: currentWarehouse,
        user: currentUser.email,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => alert("Adjustment saved!"));
    }

    function exportCSV() {
      alert("CSV export coming soon. For now take screenshot of the table.");
    }
  </script>
</body>
</html>
